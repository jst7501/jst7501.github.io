                                        <Badge color="gray">{translateStrategy(t.strategy)}</Badge>
                                        <span className="text-xs text-toss-gray-400 font-bold">{t.date}</span>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <div className={`text-[15px] font-black ${t.profit_amount >= 0 ? 'text-toss-red' : 'text-toss-blue'}`}>
                                        {t.profit_amount >= 0 ? '+' : ''}{t.profit_rate.toFixed(2)}%
                                    </div>
                                    <div className="text-xs font-bold text-toss-gray-400">
                                        {t.profit_amount >= 0 ? '+' : ''}₩{t.profit_amount.toLocaleString()}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-20 py-10 border-t border-toss-gray-200 text-center">
                        <div className="text-toss-gray-400 font-bold text-sm">주리인(JURIN) 퀀트 트레이딩 시스템 | 실험적 대시보드</div>
                        <div className="text-[10px] text-toss-gray-300 mt-2">© 2026 JST Quantum Research. 투자 권유가 아닙니다.</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
